<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hebrew Verbs</title>
    <!-- Telegram Mini Apps SDK -->
    <script src="data.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="app">
        <header>
            <h1 id="title">Глаголы</h1>
            <div id="progress-text" style="font-size: 14px; color: var(--primary-color); font-weight: bold; margin-top: 5px;"></div>
            <select id="group-select" onchange="changeGroup()">
                <option value="0">Все группы</option>
                <!-- Опции будут добавлены через JS -->
            </select>
            <button id="dict-btn" onclick="toggleDictionary()" class="tg-btn" style="margin-top: 15px; padding: 8px;">📚 Мой словарь</button>
        </header>

        <main>
            <div id="quiz-view">
                <div id="quiz-container" class="card">
                    <h2>Загрузка...</h2>
                </div>

                <!-- ИИ Помощник -->
                <div id="ai-section" style="display: none; margin-top: 15px;">
                    <button class="ai-btn" onclick="showAiMenu()">✨ Спросить ИИ</button>
                </div>

                <button id="next-btn" class="tg-btn" style="display: none;" onclick="nextQuestion()">Следующее слово ➔</button>
            </div>

            <div id="dict-view" style="display: none; padding: 10px;" class="card">
                <button onclick="openGenModal()" style="width: 100%; padding: 10px; margin-bottom: 15px; border-radius: 8px; background: linear-gradient(135deg, #10b981 0%, #3b82f6 100%); color: white; font-weight: bold; cursor: pointer; border: none; font-size: 16px;">🪄 Сгенерировать новые слова</button>
                <div id="dict-content"></div>
            </div>
        </main>

        <!-- Модальное окно ИИ -->
        <div id="ai-modal" class="modal">
            <div class="modal-content">
                <span class="close" onclick="closeModal()">&times;</span>
                <div id="ai-menu">
                    <h3>Что хочешь узнать?</h3>
                    <button onclick="askAi('example')">📝 Пример предложения</button>
                    <button onclick="askAi('plural')">👥 Множественное число</button>
                    <button onclick="askAi('binyan')">🏗️ Объясни биньян</button>
                </div>
                <div id="ai-response" style="display: none;">
                    <p id="ai-text">Загрузка...</p>
                    <button onclick="backToAiMenu()">Назад</button>
                </div>
            </div>
    </div>

    <!-- Модальное окно генерации слов -->
    <div id="gen-modal" class="modal" style="z-index: 9999;">
        <div class="modal-content">
            <span class="close" onclick="closeGenModal()">&times;</span>
            <h3>🪄 Сгенерировать слова</h3>
            
            <div style="margin-bottom: 12px; text-align: left;">
                <label style="font-size: 14px; opacity: 0.8; font-weight: bold;">Тема (например: Путешествие):</label>
                <input type="text" id="gen-topic" placeholder="Путешествие" style="width: 100%; padding: 10px; margin-top: 5px; border-radius: 8px; border: 1px solid var(--primary-color); box-sizing: border-box; background: var(--bg-color); color: var(--text-color); font-size: 16px;">
            </div>

            <div style="margin-bottom: 15px; text-align: left;">
                <label style="font-size: 14px; opacity: 0.8; font-weight: bold;">Сколько слов:</label>
                <input type="number" id="gen-amount" value="10" min="1" max="20" style="width: 100%; padding: 10px; margin-top: 5px; border-radius: 8px; border: 1px solid var(--primary-color); box-sizing: border-box; background: var(--bg-color); color: var(--text-color); font-size: 16px;">
            </div>

            <button onclick="generateWords()" style="width: 100%; padding: 12px; border-radius: 8px; background: linear-gradient(135deg, #10b981 0%, #3b82f6 100%); color: white; font-weight: bold; cursor: pointer; border: none; font-size: 16px;">Создать группу</button>
            <p id="gen-status" style="margin-top: 10px; font-weight: bold; text-align: center; color: var(--primary-color);"></p>
        </div>
    </div>

    <script src="app.js?v=2.4"></script>
</body>

</html>
